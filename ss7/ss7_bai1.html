<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout giống đề</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f1f1f1;
        }

        .wrapper{
            width:85%;
            margin:20px auto;
            background:white;
        }


        .navbar{
            background:#222;
            display:flex;
            justify-content:space-between;
            align-items:center;
            min-height:50px;
        }

        .nav-left{
            display:flex;
            list-style:none;
        }

        .nav-left li{
            padding:16px 18px;
            color:#cfcfcf;
            font-size:13px;
            border-right:1px solid #2f2f2f;
        }

        .nav-left li:first-child{
            background:#2f2f2f;
            color:white;
            font-size:20px;
            padding:11px 18px;
        }

        .nav-left li:nth-child(2){
            color:white;
            font-weight:bold;
            background:black;
        }

        .login{
            color:#cfcfcf;
            padding:0 18px;
        }


        .main{
            display:flex;
            min-height:500px;
        }

        .left{
            width:16%;
            background:#f1f1f1;
            text-align:center;
            padding-top:18px;
        }

        .left a{
            display:block;
            margin:14px 0;
            color:#2c78c5;
            text-decoration:none;
        }

        .center{
            width:68%;
            padding:18px 16px;
            background:white;
        }

        .center h1{
            font-size:24px;
            margin-bottom:12px;
        }

        .center p{
            font-size:13px;
            line-height:1.6;
        }

        .center hr{
            border:none;
            border-top:1px solid #ddd;
            margin:22px 0 16px;
        }

        .center h2{
            margin-bottom:8px;
        }

        .right{
            width:16%;
            background:#f1f1f1;
            padding:12px 10px;
        }

        .ads{
            width:100%;
            height:85px;
            border:1px solid #d8d8d8;
            background:#fafafa;
            display:flex;
            justify-content:center;
            align-items:center;
            margin-bottom:16px;
        }

        .footer{
            background:#666;
            color:white;
            text-align:center;
            padding:18px 0;
        }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="navbar">
        <ul class="nav-left">
            <li>Logo</li>
            <li>Home</li>
            <li>About</li>
            <li>Projects</li>
            <li>Contact</li>
        </ul>

        <div class="login">Login</div>
    </div>

    <div class="main">

        <div class="left">
            <a href="#">Link</a>
            <a href="#">Link</a>
            <a href="#">Link</a>
        </div>

        <div class="center">
            <h1>Welcome</h1>
            <p>
                Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do
                eiusmod tempor incididunt ut labore et dolore magna aliqua.
            </p>

            <hr>

            <h2>Test</h2>
            <p>Lorem ipsum...</p>
        </div>

        <div class="right">
            <div class="ads">ADS</div>
            <div class="ads">ADS</div>
        </div>

    </div>

    <div class="footer">Footer Text</div>

</div>

</body>
</html>
